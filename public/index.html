<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>trackr — follow the tour</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #faf8f5;
      --cream-dark: #f0ebe3;
      --charcoal: #1a1a1a;
      --charcoal-light: #2d2d2d;
      --accent: #c9a87c;
      --accent-hover: #b8976a;
      --rose: #c4a4a4;
      --border: #e0d5c7;
      --muted: #8a7e72;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      line-height: 1.6;
      min-height: 100vh;
    }

    .site-header {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .site-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--charcoal);
    }

    .site-header .tagline {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-top: 8px;
    }

    .search-section {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .search-box input {
      flex: 1;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      background: white;
      color: var(--charcoal);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus { border-color: var(--accent); }
    .search-box input::placeholder { color: var(--muted); }

    .search-box button {
      padding: 14px 28px;
      background: var(--charcoal);
      color: var(--cream);
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .search-box button:hover {
      background: var(--charcoal-light);
      transform: translateY(-1px);
    }

    .search-box button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .tour-select-wrapper {
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.4s ease;
      pointer-events: none;
    }

    .tour-select-wrapper.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .tour-select-wrapper select {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      background: white;
      color: var(--charcoal);
      cursor: pointer;
      outline: none;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%238a7e72' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 16px center;
    }

    .stats-bar {
      max-width: 900px;
      margin: 0 auto 30px;
      padding: 0 20px;
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .stats-bar.visible {
      display: grid;
      animation: fadeIn 0.6s ease;
    }

    .stat-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-card .number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--charcoal);
      line-height: 1;
    }

    .stat-card .label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 6px;
    }

    .map-section {
      max-width: 1100px;
      margin: 0 auto 50px;
      padding: 0 20px;
      display: none;
    }

    .map-section.visible {
      display: block;
      animation: fadeIn 0.8s ease;
    }

    .map-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .map-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 600;
    }

    .map-header .tour-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .map-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #map {
      width: 100%;
      height: 500px;
      z-index: 1;
    }

    /* Play Controls Overlay */
    .play-controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(26, 26, 26, 0.92);
      backdrop-filter: blur(12px);
      border-radius: 14px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .play-controls.visible {
      opacity: 1;
      pointer-events: all;
    }

    .play-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .play-btn:hover {
      background: var(--accent);
      color: var(--charcoal);
    }

    .play-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .progress-wrap {
      flex: 1;
      min-width: 160px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .progress-info span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.7);
    }

    .progress-info .current-city {
      color: var(--accent);
      font-weight: 500;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .speed-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .speed-btn:hover, .speed-btn.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(201, 168, 124, 0.12);
    }

    .stops-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 80px;
      display: none;
    }

    .stops-section.visible {
      display: block;
      animation: fadeIn 0.8s ease 0.2s both;
    }

    .stops-section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .stops-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .stop-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .stop-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .stop-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      border-color: var(--accent);
    }

    .stop-card:hover::before { opacity: 1; }

    .stop-card.active {
      border-color: var(--accent);
      background: var(--cream-dark);
    }

    .stop-card.active::before { opacity: 1; }

    .stop-card.playing {
      border-color: var(--accent);
      background: var(--cream-dark);
      box-shadow: 0 0 0 3px rgba(201, 168, 124, 0.2);
    }

    .stop-card.playing::before { opacity: 1; }

    .stop-number {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .stop-city {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--charcoal);
      margin-bottom: 4px;
    }

    .stop-venue {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stop-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      color: var(--charcoal-light);
      background: var(--cream-dark);
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 6px;
    }

    .stop-location {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .stop-location .state {
      color: var(--accent);
      font-weight: 500;
    }

    .stop-location .sep {
      color: var(--border);
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .error-msg {
      color: #c44;
      font-size: 0.9rem;
      margin-top: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .leaflet-popup-content {
      margin: 12px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      .site-header h1 { font-size: 2.8rem; }
      .search-box { flex-direction: column; }
      .stats-bar { grid-template-columns: 1fr; }
      #map { height: 350px; }
      .stops-grid { grid-template-columns: 1fr; }
      .play-controls { padding: 10px 14px; gap: 10px; }
      .progress-wrap { min-width: 100px; }
    }
  </style>
<base target="_blank">
</head>
<body>

  <header class="site-header">
    <h1>trackr</h1>
    <p class="tagline">follow the tour</p>
  </header>

  <section class="search-section">
    <div class="search-box">
      <input 
        type="text" 
        id="artistInput" 
        placeholder="Search for an artist..." 
        autocomplete="off"
      />
      <button id="searchBtn" onclick="searchArtist()">Search</button>
    </div>
    <div id="errorMsg" class="error-msg"></div>

    <div id="tourSelectWrapper" class="tour-select-wrapper">
      <select id="tourSelect" onchange="selectTour()">
        <option value="">Select a tour...</option>
      </select>
    </div>
  </section>

  <section id="statsBar" class="stats-bar">
    <div class="stat-card">
      <div class="number" id="statShows">0</div>
      <div class="label">Shows</div>
    </div>
    <div class="stat-card">
      <div class="number" id="statCities">0</div>
      <div class="label">Cities</div>
    </div>
    <div class="stat-card">
      <div class="number" id="statCountries">0</div>
      <div class="label">Countries</div>
    </div>
  </section>

  <section id="mapSection" class="map-section">
    <div class="map-header">
      <h2 id="mapTitle">Tour Route</h2>
      <span class="tour-name" id="mapTourName"></span>
    </div>
    <div class="map-wrap">
      <div id="map"></div>

      <!-- Play Controls Overlay -->
      <div id="playControls" class="play-controls">
        <button id="playBtn" class="play-btn" onclick="togglePlay()" title="Play tour">
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <div class="progress-wrap">
          <div class="progress-info">
            <span id="progressCity">Ready</span>
            <span id="progressCount">0 / 0</span>
          </div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <button class="speed-btn active" data-speed="1" onclick="setSpeed(1)">1x</button>
        <button class="speed-btn" data-speed="2" onclick="setSpeed(2)">2x</button>
        <button class="speed-btn" data-speed="4" onclick="setSpeed(4)">4x</button>
      </div>
    </div>
  </section>

  <section id="stopsSection" class="stops-section">
    <h2>Tour Stops</h2>
    <div id="stopsList" class="stops-grid"></div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // State
    let currentArtist = null;
    let currentTour = null;
    let map = null;
    let markers = [];
    let routeLine = null;
    let currentShows = [];

    // Playback state
    let isPlaying = false;
    let playIndex = 0;
    let playSpeed = 1;
    let playTimeout = null;
    const BASE_DWELL = 2500; // ms at each stop

    function initMap() {
      if (map) return;

      map = L.map('map', {
        zoomControl: false,
        attributionControl: false
      }).setView([30, 0], 2);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      L.control.attribution({ position: 'bottomright' }).addTo(map);
      L.control.zoom({ position: 'topright' }).addTo(map);
    }

    function formatDate(dateStr) {
      const [d, m, y] = dateStr.split('-');
      const date = new Date(`${y}-${m}-${d}`);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function setError(msg) {
      document.getElementById('errorMsg').textContent = msg;
    }
    function clearError() {
      document.getElementById('errorMsg').textContent = '';
    }

    async function searchArtist() {
      const input = document.getElementById('artistInput');
      const btn = document.getElementById('searchBtn');
      const name = input.value.trim();

      if (!name) return;

      clearError();
      stopPlayback();
      btn.disabled = true;
      btn.innerHTML = 'Searching<span class="loading"></span>';

      // Reset downstream UI
      document.getElementById('tourSelectWrapper').classList.remove('visible');
      document.getElementById('statsBar').classList.remove('visible');
      document.getElementById('mapSection').classList.remove('visible');
      document.getElementById('stopsSection').classList.remove('visible');
      document.getElementById('playControls').classList.remove('visible');
      document.getElementById('tourSelect').innerHTML = '<option value="">Select a tour...</option>';

      try {
        const res = await fetch(`/api/search-artist?name=${encodeURIComponent(name)}`);
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || 'Artist not found');
        }

        currentArtist = await res.json();

        // Load tours
        const toursRes = await fetch(`/api/tours?mbid=${currentArtist.mbid}`);
        const toursData = await toursRes.json();

        if (!toursData.tours || !Array.isArray(toursData.tours) || toursData.tours.length === 0) {
          setError('No tours found for this artist.');
          return;
        }

        const select = document.getElementById('tourSelect');
        toursData.tours.forEach(tour => {
          const opt = document.createElement('option');
          opt.value = tour;
          opt.textContent = tour;
          select.appendChild(opt);
        });

        document.getElementById('tourSelectWrapper').classList.add('visible');

      } catch (err) {
        setError(err.message || 'Something went wrong. Try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Search';
      }
    }

    async function selectTour() {
      const select = document.getElementById('tourSelect');
      const tourName = select.value;

      if (!tourName || !currentArtist) return;

      clearError();
      stopPlayback();
      currentTour = tourName;
      select.disabled = true;

      try {
        const res = await fetch(`/api/tour-shows?mbid=${currentArtist.mbid}&tour=${encodeURIComponent(tourName)}`);
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || 'Failed to load tour');
        }

        const data = await res.json();
        currentShows = data.shows || [];

        if (currentShows.length === 0) {
          setError('No shows found for this tour.');
          return;
        }

        // Update stats
        const uniqueCities = new Set(currentShows.map(s => s.city));
        const uniqueCountries = new Set(currentShows.map(s => s.country));

        document.getElementById('statShows').textContent = currentShows.length;
        document.getElementById('statCities').textContent = uniqueCities.size;
        document.getElementById('statCountries').textContent = uniqueCountries.size;
        document.getElementById('statsBar').classList.add('visible');

        // Update map
        document.getElementById('mapTourName').textContent = tourName;
        document.getElementById('mapSection').classList.add('visible');
        initMap();
        renderRoute(currentShows);

        // Show play controls
        document.getElementById('playControls').classList.add('visible');
        updateProgress(0);

        // Update stops list
        document.getElementById('stopsSection').classList.add('visible');
        renderStops(currentShows);

        setTimeout(() => {
          document.getElementById('mapSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);

      } catch (err) {
        setError(err.message || 'Failed to load tour data.');
      } finally {
        select.disabled = false;
      }
    }

    function renderRoute(shows) {
      markers.forEach(m => map.removeLayer(m));
      if (routeLine) map.removeLayer(routeLine);
      markers = [];

      const validShows = shows.filter(s => s.coords && s.coords.lat && s.coords.long);
      if (validShows.length === 0) {
        setError('No location data available for this tour.');
        return;
      }

      const latlngs = validShows.map(s => [s.coords.lat, s.coords.long]);

      routeLine = L.polyline(latlngs, {
        color: '#c9a87c',
        weight: 2.5,
        opacity: 0.7,
        lineCap: 'round',
        lineJoin: 'round'
      }).addTo(map);

      map.fitBounds(routeLine.getBounds(), { 
        padding: [60, 60],
        maxZoom: 10,
        animate: true,
        duration: 1.5
      });

      validShows.forEach((show, i) => {
        setTimeout(() => {
          const marker = L.circleMarker([show.coords.lat, show.coords.long], {
            radius: 7,
            fillColor: '#faf8f5',
            color: '#c9a87c',
            weight: 2.5,
            opacity: 1,
            fillOpacity: 0.95
          }).addTo(map);

          const stateLine = show.state ? `<div style="font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: #c9a87c; margin-bottom: 4px;">${show.state}</div>` : '';

          marker.bindPopup(`
            <div style="min-width: 160px;">
              <div style="font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; color: #1a1a1a; margin-bottom: 4px;">
                ${show.order}. ${show.city}
              </div>
              ${stateLine}
              <div style="font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: #888; margin-bottom: 6px;">
                ${formatDate(show.date)}
              </div>
              <div style="font-size: 0.85rem; color: #555;">
                ${show.venue}
              </div>
              ${show.setlistUrl ? `<a href="${show.setlistUrl}" target="_blank" style="display: inline-block; margin-top: 8px; font-size: 0.8rem; color: #c9a87c; text-decoration: none;">View setlist →</a>` : ''}
            </div>
          `, { closeButton: false, offset: [0, -5] });

          marker.showData = show;
          marker.on('click', () => highlightStop(show.order, true));
          markers.push(marker);
        }, i * 80);
      });
    }

    function renderStops(shows) {
      const container = document.getElementById('stopsList');
      container.innerHTML = '';

      shows.forEach(show => {
        const card = document.createElement('div');
        card.className = 'stop-card';
        card.dataset.order = show.order;
        card.onclick = () => {
          stopPlayback();
          highlightStop(show.order, true); // true = scroll into view on manual click
          if (show.coords) {
            map.flyTo([show.coords.lat, show.coords.long], 12, {
              duration: 1.5,
              easeLinearity: 0.25
            });
            const marker = markers.find(m => m.showData.order === show.order);
            if (marker) marker.openPopup();
          }
        };

        // Build location line: State / Country
        const locationParts = [];
        if (show.state) locationParts.push(`<span class="state">${show.state}</span>`);
        if (show.country && show.country !== 'Unknown Country') {
          locationParts.push(show.country);
        }
        const locationHtml = locationParts.length > 0 
          ? `<div class="stop-location">${locationParts.join('<span class="sep">/</span>')}</div>` 
          : '';

        card.innerHTML = `
          <div class="stop-number">Stop ${show.order}</div>
          <div class="stop-city">${show.city}</div>
          <div class="stop-venue">${show.venue}</div>
          <div class="stop-date">${formatDate(show.date)}</div>
          ${locationHtml}
        `;

        container.appendChild(card);
      });
    }

    function highlightStop(order, shouldScroll = false) {
      document.querySelectorAll('.stop-card').forEach(c => {
        c.classList.remove('active', 'playing');
      });
      const card = document.querySelector(`.stop-card[data-order="${order}"]`);
      if (card) {
        card.classList.add('active');
        // FIX: Only scroll on manual clicks, not during auto-playback
        if (shouldScroll) {
          card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }
    }

    // ==================== PLAYBACK ====================

    function togglePlay() {
      if (isPlaying) {
        stopPlayback();
      } else {
        startPlayback();
      }
    }

    function startPlayback() {
      if (currentShows.length === 0) return;

      isPlaying = true;
      document.getElementById('playIcon').style.display = 'none';
      document.getElementById('pauseIcon').style.display = 'block';

      // If at the end, restart
      if (playIndex >= currentShows.length) {
        playIndex = 0;
      }

      playNext();
    }

    function stopPlayback() {
      isPlaying = false;
      if (playTimeout) {
        clearTimeout(playTimeout);
        playTimeout = null;
      }
      document.getElementById('playIcon').style.display = 'block';
      document.getElementById('pauseIcon').style.display = 'none';
      document.querySelectorAll('.stop-card').forEach(c => c.classList.remove('playing'));
    }

    function playNext() {
      if (!isPlaying || playIndex >= currentShows.length) {
        if (playIndex >= currentShows.length) {
          stopPlayback();
          playIndex = 0;
          updateProgress(0);
        }
        return;
      }

      const show = currentShows[playIndex];

      // Highlight card (NO scroll during playback)
      document.querySelectorAll('.stop-card').forEach(c => c.classList.remove('playing'));
      const card = document.querySelector(`.stop-card[data-order="${show.order}"]`);
      if (card) {
        card.classList.add('playing');
        // FIX: Removed scrollIntoView here — it was causing the page to jump during playback
      }

      // Update progress
      updateProgress(playIndex + 1);

      // Fly to location
      if (show.coords && show.coords.lat && show.coords.long) {
        map.flyTo([show.coords.lat, show.coords.long], 10, {
          duration: 2.0 / playSpeed,
          easeLinearity: 0.25
        });

        // Open popup after fly
        const marker = markers.find(m => m.showData.order === show.order);
        if (marker) {
          setTimeout(() => {
            if (isPlaying) marker.openPopup();
          }, (1200 / playSpeed));
        }
      }

      // Schedule next
      playTimeout = setTimeout(() => {
        playIndex++;
        playNext();
      }, BASE_DWELL / playSpeed);
    }

    function updateProgress(completed) {
      const total = currentShows.length;
      const pct = total > 0 ? (completed / total) * 100 : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressCount').textContent = `${completed} / ${total}`;

      if (completed > 0 && completed <= total) {
        const show = currentShows[completed - 1];
        document.getElementById('progressCity').textContent = show.city;
        document.getElementById('progressCity').classList.add('current-city');
      } else if (completed === 0) {
        document.getElementById('progressCity').textContent = 'Ready';
        document.getElementById('progressCity').classList.remove('current-city');
      }
    }

    function setSpeed(speed) {
      playSpeed = speed;
      document.querySelectorAll('.speed-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.speed) === speed);
      });
    }

    // Enter key to search
    document.getElementById('artistInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchArtist();
    });
  </script>
</body>
</html>
